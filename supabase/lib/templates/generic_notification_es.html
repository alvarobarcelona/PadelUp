<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{headerTitle}}</title>
    <style type="text/css">
      body {
        margin: 0;
        padding: 0;
        min-width: 100%;
        background-color: #0f172a;
        font-family: Arial, sans-serif;
      }
      a {
        text-decoration: none;
      }
      table {
        border-collapse: collapse;
      }
      td,
      th {
        vertical-align: top;
      }
    </style>
  </head>
  <body
    style="margin: 0; padding: 0; background-color: #0f172a; color: #e2e8f0"
  >
    <table
      border="0"
      cellpadding="0"
      cellspacing="0"
      width="100%"
      bgcolor="#0f172a"
    >
      <tr>
        <td align="center" style="padding: 40px 10px">
          <table
            border="0"
            cellpadding="0"
            cellspacing="0"
            width="100%"
            style="
              max-width: 600px;
              background-color: #1e293b;
              border-radius: 12px;
              overflow: hidden;
              border: 1px solid #334155;
            "
          >
            <!-- Header -->
            <tr>
              <td
                align="center"
                bgcolor="#16a34a"
                style="
                  padding: 40px 20px;
                  background: linear-gradient(135deg, #16a34a 0%, #059669 100%);
                "
              >
                <a
                  href="#"
                  style="
                    color: #ffffff;
                    font-size: 32px;
                    font-weight: bold;
                    text-decoration: none;
                    font-family: Arial, sans-serif;
                  "
                >
                  PadelUp
                </a>
                <p
                  style="
                    margin: 8px 0 0 0;
                    color: #bbf7d0;
                    font-size: 14px;
                    font-family: Arial, sans-serif;
                  "
                >
                  Novedades de la Comunidad
                </p>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td align="center" style="padding: 40px 32px">
                <h1
                  style="
                    color: #f8fafc;
                    font-size: 24px;
                    font-weight: bold;
                    margin: 0 0 16px 0;
                    font-family: Arial, sans-serif;
                    text-align: center;
                  "
                >
                  {{headerTitle}}
                </h1>

                <p
                  style="
                    color: #e2e8f0;
                    font-size: 18px;
                    margin: 0 0 24px 0;
                    font-family: Arial, sans-serif;
                    text-align: center;
                  "
                >
                  ¡Hola {{name}}!
                </p>

                <div
                  style="
                    color: #94a3b8;
                    font-size: 16px;
                    line-height: 1.7;
                    margin: 0 0 32px 0;
                    font-family: Arial, sans-serif;
                    text-align: left;
                    background-color: #0f172a;
                    padding: 24px;
                    border-radius: 8px;
                    border: 1px solid #334155;
                  "
                >
                  {{message}}
                </div>


              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                align="center"
                bgcolor="#0f172a"
                style="
                  padding: 24px;
                  border-top: 1px solid #334155;
                  font-size: 12px;
                  color: #64748b;
                  font-family: Arial, sans-serif;
                "
              >
                &copy; 2026 PadelUp. Todos los derechos reservados.<br />
                <br />
                PadelUp Community<br />
                Si tienes dudas, escríbenos a: <strong>padeluppadeleros@gmail.com</strong><br />
                Si no deseas recibir más correos de este tipo, puedes 
                <a href="{{unsubscribe_url}}" style="color: #16a34a; text-decoration: underline;">darte de baja aquí</a>.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
